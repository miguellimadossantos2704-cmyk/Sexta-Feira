<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexta-Feira OS - Interface de Elite</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #161b22;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(88, 166, 255, 0.2);
            width: 90%;
            max-width: 500px;
            border: 1px solid #30363d;
        }

        h1 {
            color: #58a6ff;
            text-align: center;
            margin-top: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            background-color: #0d1117;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 1rem;
            height: 120px;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #58a6ff;
        }

        button {
            width: 100%;
            background-color: #238636;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background-color: #2ea043;
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #21262d;
            color: #484f58;
            cursor: not-allowed;
            transform: none;
        }

        .resposta-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #0d1117;
            border-left: 4px solid #58a6ff;
            border-radius: 4px;
            min-height: 60px;
            white-space: pre-wrap;
            font-style: italic;
            color: #8b949e;
        }

        .status {
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            color: #484f58;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Sexta-Feira OS</h1>
        <textarea id="input-user" placeholder="Diga algo, Chefe... (se não for bobagem)"></textarea>
        <button id="btn-enviar" onclick="perguntarSextaFeira()">Enviar Comando</button>

        <div class="resposta-box" id="resposta-ia">
            Sistema online. Aguardando ordens...
        </div>
        <div class="status">Conexão via Tunel Gemini 1.5 Flash</div>
    </div>

    <script>
        async function perguntarSextaFeira() {
            const inputElement = document.getElementById('input-user');
            const respostaTela = document.getElementById('resposta-ia');
            const btnEnviar = document.getElementById('btn-enviar');

            const pergunta = inputElement.value.trim();
            // A chave de elite que você gerou
            const apiKey = "AIzaSyB1DazEcPxxyHjXFCpYWB2O4eVU64MjE_M";

            if (!pergunta) {
                respostaTela.innerText = "Chefe, eu sou uma IA, não uma vidente. Digita alguma coisa aí! 🙄";
                return;
            }

            // Feedback visual de processamento
            respostaTela.innerText = "Processando... segura a onda, Chefe! 🚀";
            btnEnviar.disabled = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: "Você é a Sexta-Feira, assistente de elite, sarcástica, engraçada e que sempre chama o usuário de Chefe. Use gírias e emojis. Responda a isso: " + pergunta
                            }]
                        }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content) {
                    const textoFormatado = data.candidates[0].content.parts[0].text;
                    respostaTela.innerText = textoFormatado;
                    inputElement.value = ''; // Limpa o campo para a próxima ordem
                } else {
                    respostaTela.innerText = "Erro no núcleo, Chefe. O Google me deu um vácuo. 💀";
                }

            } catch (error) {
                console.error("Erro fatal:", error);
                respostaTela.innerText = "Deu ruim no túnel! Verifica essa internet ou a chave de API. 🛰️💨";
            } finally {
                btnEnviar.disabled = false;
                btnEnviar.innerText = "Enviar Comando";
            }
        }

        // Atalho: Enviar com Ctrl + Enter
        document.getElementById('input-user').addEventListener('keydown', function (e) {
            if (e.ctrlKey && e.keyCode === 13) {
                perguntarSextaFeira();
            }
        });
    </script>
</body>

</html>
